name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Java 17 Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Klasör Yapısını Göster
        run: find . -maxdepth 3 -type f -name "*.gradle" | head -20

      - name: Gradle Wrapper Hazırla
        working-directory: KisiTakip_GitHub_Project/KisiTakipProject
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          /opt/gradle/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: APK Derle
        working-directory: KisiTakip_GitHub_Project/KisiTakipProject
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: APK Yükle
        uses: actions/upload-artifact@v4
        with:
          name: KisiTakip-Debug-APK
          path: KisiTakip_GitHub_Project/KisiTakipProject/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
